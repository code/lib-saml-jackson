internal:
  ports:
  - name: original
    port: 5225
    targetPort: 5225
  type: ClusterIP
jackson:
  dbManualMigration: "true"
  dbUrl: postgres://postgres:password@jackson-postgres:5432/postgres
  jackson:
    image:
      repository: boxyhq/jackson
      tag: 26.2.0
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
      requests:
        cpu: 100m
  apiKeys: secret
  nextauthSecret: secret
  nextauthUrl: http://localhost:5225
  ports:
  - name: original
    port: 5225
    targetPort: 5225
  replicas: 1
  type: LoadBalancer
kubernetesClusterDomain: cluster.local
migratePg:
  db:
    image:
      repository: boxyhq/jackson
      tag: 26.2.0
    imagePullPolicy: IfNotPresent

